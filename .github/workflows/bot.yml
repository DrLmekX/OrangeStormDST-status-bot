name: Aktualizacja Statusu DST

on:
  schedule:
    - cron: '*/5 * * * *' # Odpalaj co 5 minut
  workflow_dispatch: # Przycisk do ręcznego odpalania

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Pobieranie repozytorium
        uses: actions/checkout@v3

      - name: Konfiguracja Pythona
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalacja bibliotek
        run: pip install -r requirements.txt

      - name: Uruchomienie bota
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python bot.py
